<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <!-- Menubar template: eye closed = no sessions -->

  <!-- Closed eye — single curved line -->
  <path d="M6 22
    C 9 28.5 15 32 22 32
    C 29 32 35 28.5 38 22"
    fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyelashes (3 small lines) -->
  <line x1="14" y1="29" x2="13" y2="33" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="22" y2="36" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="29" x2="31" y2="33" stroke="black" stroke-width="2" stroke-linecap="round"/>
</svg>
